[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 512 }
ffi = false
gas_reports = ["RiskEngine", "PolicyRegistry", "AgentGuard"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
arb_sepolia = "${ARB_SEPOLIA_RPC}"

[etherscan]
arb_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }

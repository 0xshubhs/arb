[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 512 }
ffi = false
gas_reports = ["MandateVault", "StockAMM", "MandateVaultFactory"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
rh_testnet = "${RH_RPC_URL}"

[etherscan]
rh_testnet = { key = "${BLOCKSCOUT_API_KEY}", url = "${BLOCKSCOUT_URL}/api", chain = 46630 }
